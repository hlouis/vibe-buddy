name: VibeBuddy
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGN_STYLE: Automatic
    # 1 = iPhone, 2 = iPad. The single binary covers both form factors.
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
packages:
  VibeBuddyCore:
    path: ../shared
targets:
  VibeBuddy:
    type: application
    platform: iOS
    sources:
      - path: VibeBuddy
    dependencies:
      - package: VibeBuddyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.vibebuddy.ios
        PRODUCT_NAME: VibeBuddy
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Vibe Buddy needs Bluetooth to connect to your M5Stack hardware."
        # Adaptive UI for portrait + both landscape orientations on iPad;
        # iPhone defaults to portrait-only.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Required so CoreBluetooth keeps the GATT link alive when the
        # user backgrounds the app to paste a transcript into another app.
        INFOPLIST_KEY_UIBackgroundModes: "bluetooth-central"
        DEVELOPMENT_TEAM: ""

  # Unit tests for the iOS-specific glue (TextRouter, PasteboardHandler,
  # WebViewInjector diff, InjectionScript, BookmarkStore). The shared
  # business logic has its own SwiftPM test target under ../shared.
  VibeBuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VibeBuddyTests
    dependencies:
      - target: VibeBuddy
      - package: VibeBuddyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.vibebuddy.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VibeBuddy.app/VibeBuddy"
        BUNDLE_LOADER: "$(TEST_HOST)"
